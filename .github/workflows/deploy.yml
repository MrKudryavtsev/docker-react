name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - master

env:
  REGISTRY_ID: 'crp7as3gv0vo9o5caba8'    # ваш ID реестра
  FOLDER_ID: 'b1g500gut4abvcd5ndkp'   # замените
  VM_NAME: 'my-app-vm'
  IMAGE_NAME: 'my-frontend-app'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Yandex Cloud
        run: |
            echo "${{ secrets.YC_SA_JSON_BASE64 }}" | base64 -d > key.json
            docker login --username json-key --password-stdin cr.yandex < key.json

      - name: Build Docker image
        run: |
          docker build -t cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to VM
        uses: yc-actions/yc-coi-deploy@v2
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          folder-id: ${{ env.FOLDER_ID }}
          vm-name: ${{ env.VM_NAME }}
          vm-service-account-id: ${{ secrets.YC_SA_ID }}
          image: cr.yandex/${{ env.REGISTRY_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          vm-cores: 2
          vm-memory: 2Gb
          vm-core-fraction: 20